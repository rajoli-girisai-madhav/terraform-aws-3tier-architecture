name: Reusable Terraform CI/CD Pipeline

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws_region:
        required: true
        type: string

jobs:

  terraform-ci:
    name: Terraform CI
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ inputs.aws_region }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ inputs.environment }}-${{ env.AWS_REGION }}.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Select/Create Workspace
        run: |
          terraform workspace select ${{ inputs.environment }} || terraform workspace new ${{ inputs.environment }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="aws_region=${{ env.AWS_REGION }}" -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: tfplan


  terraform-cd:
    name: Terraform CD
    runs-on: ubuntu-latest
    needs: terraform-ci

    environment: ${{ inputs.environment }}

    env:
      AWS_REGION: ${{ inputs.aws_region }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ inputs.environment }}/${{ env.AWS_REGION }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Select/Create Workspace
        run: |
          terraform workspace select ${{ inputs.environment }} || terraform workspace new ${{ inputs.environment }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ env.AWS_REGION }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Wait for stabilization
        run: sleep 300   # 5 mins

      - name: Extract Terraform Outputs
        run: terraform output -json > outputs.json

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfoutput-${{ inputs.environment }}}-${{ env.AWS_REGION }}
          path: outputs.json
