name: Reusable Terraform Destroy Pipeline

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws_region:
        required: true
        type: string

jobs:

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ inputs.aws_region }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_BACKEND_REGION: ap-south-1
      TF_VAR_aws_region: ${{ inputs.aws_region }}
      TF_VAR_environment: ${{ inputs.environment }}
      TF_VAR_project: myapp

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ inputs.environment }}/${{ env.AWS_REGION }}/terraform.tfstate" \
            -backend-config="region=${{ env.TF_BACKEND_REGION }}"

      - name: Select/Create Workspace
        run: terraform workspace select -or-create ${{ inputs.environment }}

      - name: Terraform Plan Destroy
        run: |
          terraform plan \
            -destroy \
            -input=false \
            -var-file="${{ inputs.environment }}.tfvars" \
            -var="aws_region=${{ env.AWS_REGION }}"

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -auto-approve \
            -var-file="${{ inputs.environment }}.tfvars" \
            -var="aws_region=${{ env.AWS_REGION }}"
