name: Terraform Multi-Env Multi-Region Destroy

on:
  workflow_dispatch:   # manual trigger (VERY IMPORTANT for destroy)

jobs:

  destroy-dev:
    name: Destroy Dev
    strategy:
      matrix:
        region: [eu-west-1, eu-west-2]

    uses: ./.github/workflows/terraform-destroy-resources-reusable-pipeline.yml
    with:
      environment: dev
      aws_region: ${{ matrix.region }}
    secrets:
      DB_PASSWORD: ${{ secrets.DB_PASSWORD_DEV }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_VAR_PUBLIC_KEY: ${{ secrets.TF_VAR_PUBLIC_KEY }}

  destroy-qa:
    name: Destroy QA
    needs: destroy-dev
    strategy:
      matrix:
        region: [us-west-1, us-west-2]

    uses: ./.github/workflows/terraform-destroy-resources-reusable-pipeline.yml
    with:
      environment: qa
      aws_region: ${{ matrix.region }}
    secrets:
      DB_PASSWORD: ${{ secrets.DB_PASSWORD_QA }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_VAR_PUBLIC_KEY: ${{ secrets.TF_VAR_PUBLIC_KEY }}

  destroy-prod:
    name: Destroy Prod
    needs: destroy-qa
    strategy:
      matrix:
        region: [ap-south-1, ap-south-2]

    uses: ./.github/workflows/terraform-destroy-resources-reusable-pipeline.yml
    with:
      environment: prod
      aws_region: ${{ matrix.region }}
    secrets:
      DB_PASSWORD: ${{ secrets.DB_PASSWORD_PROD }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_VAR_PUBLIC_KEY: ${{ secrets.TF_VAR_PUBLIC_KEY }}
