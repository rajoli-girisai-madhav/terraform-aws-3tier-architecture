name: Terraform Multi-Env Multi-Region Destroy

on:
  workflow_dispatch:   # manual trigger (VERY IMPORTANT for destroy)

jobs:

  destroy-dev:
    name: Destroy Dev
    strategy:
      matrix:
        region: [eu-west-1, eu-west-2]

    uses: ./.github/workflows/terraform-destroy-pipeline.yml
    with:
      environment: dev
      aws_region: ${{ matrix.region }}
    secrets: inherit
